<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code', 'Courier New', monospace">
  <defs>
    <style>
      .bg { fill: #0d0d0d; }
      .titlebar { fill: #1a1a1a; }
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      .border { fill: none; stroke: #00FF41; stroke-width: 1; opacity: 0.4; }
      .prompt { fill: #00FF41; font-size: 13px; font-weight: bold; }
      .label { fill: #aaaaaa; font-size: 13px; }
      .value { fill: #00FF41; font-size: 13px; }
      .bright { fill: #7fff7f; font-size: 13px; font-weight: bold; }
      .cursor { fill: #00FF41; }
      .dim { fill: #005500; font-size: 13px; }

      /* Each line fades/types in sequentially */
      .line { opacity: 0; }

      .l1  { animation: appear 0.05s 0.3s  forwards; }
      .l2  { animation: appear 0.05s 0.7s  forwards; }
      .l3  { animation: appear 0.05s 1.1s  forwards; }
      .l4  { animation: appear 0.05s 1.5s  forwards; }
      .l5  { animation: appear 0.05s 1.9s  forwards; }
      .l6  { animation: appear 0.05s 2.2s  forwards; }
      .l7  { animation: appear 0.05s 2.6s  forwards; }
      .l8  { animation: appear 0.05s 3.0s  forwards; }
      .l9  { animation: appear 0.05s 3.4s  forwards; }
      .l10 { animation: appear 0.05s 3.8s  forwards; }
      .l11 { animation: appear 0.05s 4.2s  forwards; }
      .l12 { animation: appear 0.05s 4.6s  forwards; }
      .l13 { animation: appear 0.05s 5.0s  forwards; }
      .l14 { animation: appear 0.05s 5.4s  forwards; }
      .l15 { animation: appear 0.05s 5.8s  forwards; }
      .l16 { animation: appear 0.05s 6.2s  forwards; }
      .l17 { animation: appear 0.05s 6.6s  forwards; }

      .cursor-blink {
        opacity: 0;
        animation: appear 0.05s 0.1s forwards, blink 1s 0.3s infinite;
      }
      .cursor-final {
        opacity: 0;
        animation: appear 0.05s 7.0s forwards, blink 1s 7.0s infinite;
      }

      @keyframes appear {
        to { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" rx="10" class="bg"/>

  <!-- Title bar -->
  <rect width="680" height="36" rx="10" class="titlebar"/>
  <rect width="680" height="18" y="18" class="titlebar"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="6" class="dot-red"/>
  <circle cx="42" cy="18" r="6" class="dot-yellow"/>
  <circle cx="62" cy="18" r="6" class="dot-green"/>

  <!-- Title -->
  <text x="340" y="23" text-anchor="middle" fill="#555555" font-size="12" font-family="'Fira Code', monospace">terminal — suvroneel@localhost</text>

  <!-- Terminal border glow -->
  <rect x="1" y="37" width="678" height="382" rx="0" rx="0" class="border"/>

  <!-- Prompt line -->
  <text x="20" y="68" class="prompt line l1">suvroneel@localhost:~$</text>
  <text x="210" y="68" class="bright line l1"> whoami</text>
  <rect x="226" y="55" width="9" height="15" class="cursor cursor-blink"/>

  <!-- Box top -->
  <text x="20" y="98" class="dim line l2">╔══════════════════════════════════════════════════════════╗</text>

  <!-- Name -->
  <text x="20" y="120" class="dim line l3">║</text>
  <text x="36" y="120" class="prompt line l3">&gt;</text>
  <text x="50" y="120" class="bright line l3">Suvroneel Nathak</text>
  <text x="620" y="120" class="dim line l3">║</text>

  <!-- Role -->
  <text x="20" y="140" class="dim line l4">║</text>
  <text x="36" y="140" class="prompt line l4">&gt;</text>
  <text x="50" y="140" class="value line l4">AI / ML Engineer</text>
  <text x="620" y="140" class="dim line l4">║</text>

  <!-- Location -->
  <text x="20" y="160" class="dim line l5">║</text>
  <text x="36" y="160" class="prompt line l5">&gt;</text>
  <text x="50" y="160" class="value line l5">Kolkata, West Bengal, India</text>
  <text x="620" y="160" class="dim line l5">║</text>

  <!-- Spacer -->
  <text x="20" y="182" class="dim line l6">║                                                          ║</text>

  <!-- Focus -->
  <text x="20" y="202" class="dim line l7">║</text>
  <text x="36" y="202" class="label line l7">FOCUS</text>
  <text x="90" y="202" class="value line l7">Generative AI  |  Agentic Systems</text>
  <text x="620" y="202" class="dim line l7">║</text>

  <text x="20" y="222" class="dim line l8">║</text>
  <text x="90" y="222" class="value line l8">Computer Vision  |  MLOps</text>
  <text x="620" y="222" class="dim line l8">║</text>

  <!-- Spacer -->
  <text x="20" y="244" class="dim line l9">║                                                          ║</text>

  <!-- Education -->
  <text x="20" y="264" class="dim line l10">║</text>
  <text x="36" y="264" class="label line l10">EDU</text>
  <text x="90" y="264" class="value line l10">B.Tech CSE — Bengal Institute of Tech</text>
  <text x="620" y="264" class="dim line l10">║</text>

  <!-- Status -->
  <text x="20" y="284" class="dim line l11">║</text>
  <text x="36" y="284" class="label line l11">STATUS</text>
  <text x="90" y="284" class="value line l11">Open to full-time and early-stage AI/ML</text>
  <text x="620" y="284" class="dim line l11">║</text>

  <!-- Spacer -->
  <text x="20" y="306" class="dim line l12">║                                                          ║</text>

  <!-- Fun lines -->
  <text x="20" y="326" class="dim line l13">║</text>
  <text x="36" y="326" class="prompt line l13">&gt;</text>
  <text x="50" y="326" class="bright line l13">I turn 2D photos into 3D meshes on a Tuesday.</text>
  <text x="620" y="326" class="dim line l13">║</text>

  <text x="20" y="346" class="dim line l14">║</text>
  <text x="36" y="346" class="prompt line l14">&gt;</text>
  <text x="50" y="346" class="bright line l14">I ship things. Check below.</text>
  <text x="620" y="346" class="dim line l14">║</text>

  <!-- Spacer -->
  <text x="20" y="368" class="dim line l15">║                                                          ║</text>

  <!-- Box bottom -->
  <text x="20" y="388" class="dim line l16">╚══════════════════════════════════════════════════════════╝</text>

  <!-- Final prompt with blinking cursor -->
  <text x="20" y="410" class="prompt line l17">suvroneel@localhost:~$</text>
  <rect x="210" y="397" width="9" height="15" class="cursor cursor-final"/>
</svg>
